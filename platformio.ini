; PlatformIO Project Configuration
; ESP32 Voice Assistant - Audio Hardware Test
;
; Board: NodeMCU-ESP32 (ESP32 DEVKIT1)
; Audio: INMP441 (I2S mic) + MAX98357A (I2S speaker)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf

upload_port = COM12
monitor_port = COM12
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; 4MB flash — custom partition: ~3.9MB for app (no OTA)
board_build.partitions = partitions.csv

; ESP-IDF build flags
build_flags =
    -DCONFIG_I2S_ISR_IRAM_SAFE=1
